# Reward Hyperparameter Sweep — QUICK TEST CONFIG
# ================================================
# Reduced steps/envs for fast validation of the sweep pipeline.
# Use this to confirm GPU is used and eval metrics are parsed correctly.
#
# NOTE: JAX JIT compilation on the first step takes ~4-5 min.
#       The eval-info path triggers a second trace (~18 min total for 30 steps).
#       Use --timeout 3600 (60 min) per trial.
#
# Usage:
#   python sweep_reward.py --config configs/sweep_reward_test.yaml \
#       --n-trials 4 --jobs 1 --device 0 --timeout 3600

# ------ shared train.py CLI args ------
base_command: >
  --algo ppo
  --env RobotPedEnv
  -n 1
  --area-size 12
  --obs 8
  --n-rays 32
  --max-step 128
  --steps 50
  --eval-interval 10
  --eval-epi 8
  --save-interval 9999
  --reward-mode proactive
  --n-env-train 4
  --n-env-test 8

# ------ search space ------
parameters:
  kappa_succ:
    distribution: int_uniform
    min: 15
    max: 40

  kappa_col:
    distribution: int_uniform
    min: -40
    max: -15

  kappa_prog:
    distribution: uniform
    min: 0.5
    max: 5.0

  kappa_safe:
    distribution: uniform
    min: 0.2
    max: 3.0

  kappa_ttc:
    distribution: uniform
    min: -1.0
    max: -0.05

  kappa_time:
    distribution: uniform
    min: 0.01
    max: 0.1

# Parameters to fix (not swept):
fixed:
  kappa_timeout: -15.0
  kappa_omega: 0.01
  kappa_delta: 0.1
  lambda_omega: 1.0
  safety_margin: 0.3
  heading_r_angle: 0.6
